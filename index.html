document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lime\"]  { --paper:#EFFFD5; --accent:#1A1A1A; --accent-2:#FF2D87; --accent-3:#C6FF3D; --ink:#0D1208; }\n  body[data-palette=\"midnight\"]{ --paper:#0F0F0F; --accent:#C6FF3D; --accent-2:#FF2D87; --accent-3:#FFD43D; --ink:#FFF1E2; }\n  body[data-palette=\"electric\"]{ --paper:#FFF1E0; --accent:#3D5AFE; --accent-2:#FF3E5A; --accent-3:#FFD43D; --ink:#0A0A20; }\n\n  /* ============ NAV ============ */\n  .nav{\n    position:sticky; top:0; z-index:50;\n    display:flex; align-items:center; justify-content:space-between;\n    padding:18px 32px;\n    background:color-mix(in srgb, var(--paper) 88%, transparent);\n    backdrop-filter: blur(10px);\n    -webkit-backdrop-filter: blur(10px);\n    border-bottom:1.5px solid color-mix(in srgb, var(--ink) 12%, transparent);\n  }\n  .logo{\n    display:flex; align-items:center; gap:10px;\n    font-family:var(--display); font-weight:800;\n    font-size:22px; letter-spacing:-0.02em;\n  }\n  .logo img{\n    height:26px; width:auto;\n    display:block;\n  }\n  body[data-palette=\"midnight\"] .logo img.ink{display:none}\n  body:not([data-palette=\"midnight\"]) .logo img.white{display:none}\n  .logo .mark{\n    display:inline-flex; align-items:center; justify-content:center;\n    width:38px; height:38px; border-radius:12px;\n    background:var(--accent); color:var(--paper);\n    font-family:var(--display); font-weight:900; font-size:22px;\n    transform:rotate(-6deg);\n  }\n  .nav-links{display:flex; gap:28px; align-items:center}\n  .nav-links a{font-weight:600; font-size:15px; opacity:.85}\n  .nav-links a:hover{opacity:1}\n  .nav-cta{\n    background:var(--ink); color:var(--paper);\n    padding:12px 22px; border-radius:999px;\n    font-weight:700; font-size:15px;\n    transition:transform .15s ease;\n  }\n  .nav-cta:hover{ transform:translateY(-2px) }\n\n  /* ============ HERO ============ */\n  .hero{\n    position:relative;\n    padding:64px 32px 80px;\n    min-height:88vh;\n    display:flex; flex-direction:column; justify-content:center;\n    overflow:hidden;\n  }\n  .hero-eyebrow{\n    display:inline-flex; align-items:center; gap:10px;\n    font-family:var(--mono); font-size:13px; letter-spacing:0.06em;\n    text-transform:uppercase; font-weight:700;\n    margin-bottom:24px;\n  }\n  .hero-eyebrow .dot{\n    width:10px; height:10px; border-radius:50%;\n    background:var(--accent-2);\n    animation:blink 1.4s ease-in-out infinite;\n  }\n  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }\n\n  .hero-title{\n    font-family:var(--display); font-weight:900;\n    font-size: clamp(48px, 9vw, 144px);\n    line-height:.9; letter-spacing:-0.04em;\n    margin:0;\n    text-wrap:balance;\n  }\n  .hero-title .row{ display:block }\n  .hero-title .free{\n    display:inline-block;\n    color:var(--accent);\n    position:relative;\n  }\n  .hero-title .free::after{\n    content:\"\"; position:absolute; left:-2%; right:-2%; bottom:6%;\n    height:14%; background:var(--accent-3);\n    z-index:-1; transform:skewY(-2deg);\n    border-radius:8px;\n  }\n  .hero-title .strike{\n    position:relative; display:inline-block;\n    color:color-mix(in srgb, var(--ink) 45%, transparent);\n  }\n  .hero-title .strike::before{\n    content:\"\"; position:absolute; top:48%; left:-4%; right:-4%; height:10%;\n    background:var(--accent-2); transform:rotate(-3deg) translateY(-50%);\n    border-radius:6px;\n  }\n\n  .hero-sub{\n    margin-top:34px;\n    max-width:640px;\n    font-size:clamp(18px, 1.6vw, 22px);\n    font-weight:500;\n    line-height:1.5;\n    color:color-mix(in srgb, var(--ink) 78%, transparent);\n  }\n\n  .hero-ctas{\n    display:flex; gap:14px; flex-wrap:wrap;\n    margin-top:38px; align-items:center;\n  }\n  .btn-primary{\n    display:inline-flex; align-items:center; gap:12px;\n    background:var(--ink); color:var(--paper);\n    padding:22px 34px; border-radius:999px;\n    font-family:var(--display); font-weight:700;\n    font-size:18px; letter-spacing:-0.01em;\n    transition:transform .15s ease, background .1 ate(-6deg) translateY(0)} 50%{transform:rotate(-8deg) translateY(-8px)} }\n  @keyframes float3{ 0%,100%{transform:rotate(-10deg) translateY(0)} 50%{transform:rotate(-12deg) translateY(-10px)} }\n  @keyframes float4{ 0%,100%{transform:rotate(-12deg) translateY(0)} 50%{transform:rotate(-15deg) translateY(-14px) } }\n  @keyframes float5{ 0%,100%{transform:rotate(4deg) translateY(0)} 50%{transform:rotate(6deg) translateY(-8px)} }\n  .sticker.s1{ animation: float1 6s ease-in-out infinite }\n  .sticker.s2{ animation: float2 5.4s ease-in-out infinite }\n  .sticker.s3{ animation: float3 6.5s ease-in-out infinite }\n  .sticker.s4{ animation: float4 7s ease-in-out infinite }\n  .sticker.s5{ animation: float5 5.8s ease-in-out infinite }\n\n  body[data-stickers=\"false\"] .sticker{ display:none }\n\n  /* Hero variant: exam picker */\n  .hero.variant-picker .hero-title .row.sub{\n    font-size: 0.4em; font-weight:700;\n    display:flex; gap:14px; align-items:center; flex-wrap:wrap;\n    margin-top:18px; letter-spacing:-0.02em;\n  }\n  .exam-pill{\n    display:inline-flex; align-items:center; gap:10px;\n    background:var(--ink); color:var(--paper);\n    padding:10px 22px; border-radius:999px;\n    cursor:pointer;\n    transition:background .15s ease, transform .15s ease;\n  }\n  .exam-pill[data-active=\"true\"]{ background:var(--accent); color:var(--paper) }\n  .exam-pill:hover{ transform:translateY(-2px) }\n\n  /* ============ MARQUEE ============ */\n  .marquee{\n    background:var(--ink); color:var(--paper);\n    padding:18px 0;\n    border-top:1.5px solid var(--ink);\n    border-bottom:1.5px solid var(--ink);\n    overflow:hidden;\n  }\n  .marquee-track{\n    display:flex; gap:36px;\n    white-space:nowrap;\n    animation: scroll 14s linear infinite;\n    font-family:var(--display); font-weight:800;\n    font-size:42px; letter-spacing:-0.02em;\n  }\n  .marquee-track .item{ display:inline-flex; align-items:center; gap:36px }\n  .marquee-track .dot{\n    width:18px; height:18px; border-radius:50%;\n    background:var(--accent);\n    display:inline-block;\n  }\n  .marquee-track .alt{ color:var(--accent-3) }\n  @keyframes scroll{ from{transform:translateX(0)} to{transform:translateX(-50%)} }\n\n  body[data-marquee=\"false\"] .marquee{ display:none }\n\n  /* ============ STATS RIBBON ============ */\n  .stats{\n    display:grid; grid-template-columns:repeat(4,1fr);\n    border-bottom:1.5px solid var(--ink);\n    position:relative;\n  }\n  .stat{\n    padding:32px 28px;\n    border-right:1.5px solid var(--ink);\n  }\n  .stat:last-child{border-right:none}\n  .stat .n{\n    font-family:var(--display); font-weight:900;\n    font-size:clamp(36px, 4vw, 64px);\n    line-height:.95;\n    letter-spacing:-0.04em;\n  }\n  .stat .l{\n    margin-top:8px;\n    font-size:13px;\n    font-family:var(--mono);\n    text-transform:uppercase; letter-spacing:0.06em;\n    opacity:.7;\n  }\n  .stat.alt{ background:var(--accent); color:var(--paper) }\n  .stat.alt .l{ opacity:.85 }\n\n  /* ============ WHY US ============ */\n  .why{\n    padding:100px 32px 80px;\n    position:relative;\n    overflow:hidden;\n  }\n  .section-head{\n    display:flex; align-items:end; justify-content:space-between;\n    gap:32px; flex-wrap:wrap;\n    margin-bottom:60px;\n  }\n  .section-eyebrow{\n    font-family:var(--mono); font-size:13px; letter-spacing:0.08em;\n    text-transform:uppercase; font-weight:700;\n    color:var(--accent);\n    margin-bottom:14px;\n  }\n  .section-title{\n    font-family:var(--display); font-weight:900;\n    font-size:clamp(44px, 6.4vw, 96px);\n    line-height:.92; letter-spacing:-0.04em;\n    margin:0;\n    max-width:18ch;\n  }\n  .section-title em{\n    font-style:normal; color:var(--accent);\n  }\n  .section-aside{\n    max-width:380px;\n    font-size:17px;\n    color:color-mix(in srgb, var(--ink) 75%, transparent);\n  }\n\n  .why-grid{\n    display:grid; grid-template-columns:repeat(12, 1fr);\n    gap:16px;\n  }\n  .card{\n    grid-column:span 4;\n    border-radius:28px;\n    padding:32px;\n    background:#fff;\n    border:1.5px solid var(--ink);\n    position:relative;\n    overflow:hidden;\n    min-height:280px;\n    display:flex; flex-direction:column; justify-content:space-between;\n    transition:transform .25s ease;\n  }\n  .card:hover{ transform:translateY(-6px) }\n  .card.tall{ grid-column:span 4; min-height:380px }\n  .card.wide{ grid-column:span 8 }\n  .card.small{ grid-column:span 4 }\n  .card .badge{\n    position:absolute; top:18px; right:18px;\n    font-family:var(--mono); font-size:11px;\n    background:var(--ink); color:var(--paper);\n    padding:6px 10px; border-radius:999px;\n    letter-spacing:0.06em;\n  }\n  .card h3{\n    font-family:var(--display); font-weight:800;\n    font-size:clamp(26px, 2.6vw, 38px);\n    line-height:1; letter-spacing:-0.03em;\n    margin:0 0 14px 0;\n  }\n  .card p{\n    margin:0;\n    font-size:16px;\n    color:color-mix(in srgb, var(--ink) 72%, transparent);\n    max-width:34ch;\n  }\n  .card .num{\n    font-family:var(--display); font-weight:900;\n    font-size:clamp(80px, 9vw, 140px);\n    line-height:.85; letter-spacing:-0.05em;\n  }\n  .card.accent{ background:var(--accent); color:var(--paper) }\n  .card.accent p{ color:color-mix(in srgb, var(--paper) 88%, transparent) }\n  .card.pink{ background:var(--accent-2); color:#fff }\n  .card.pink p{ color:rgba(255,255,255,.85) }\n  .card.yellow{ background:var(--accent-3); color:var(--ink) }\n  .card.ink{ background:var(--ink); color:var(--paper) }\n  .card.ink p{ color:color-mix(in srgb, var(--paper) 75%, transparent) }\n\n  .card .deco{\n    position:absolute;\n    pointer-events:none;\n  }\n  .card .deco.circle{\n    width:160px; height:160px; border-radius:50%;\n    right:-40px; bottom:-40px;\n    background:color-mix(in srgb, var(--ink) 12%, transparent);\n  }\n  .card.accent .deco.circle, .card.pink .deco.circle, .card.ink .deco.circle{\n    background:rgba(255,255,255,0.15);\n  }\n\n  /* ============ SUBJECTS ============ */\n  .subjects{\n    padding:80px 32px 100px;\n    border-top:1.5px solid var(--ink);\n    background:var(--ink);\n    color:var(--paper);\n    position:relative;\n    overflow:hidden;\n  }\n  .subjects .section-title{ color:var(--paper) }\n  .subjects .section-title em{ color:var(--accent-3) }\n  .subjects .section-eyebrow{ color:var(--accent-3) }\n  .subjects .section-aside{ color:color-mix(in srgb, var(--paper) 70%, transparent) }\n\n  .subj-grid{\n    display:flex; flex-wrap:wrap; gap:14px;\n  }\n  .subj{\n    display:inline-flex; align-items:center; gap:14px;\n    padding:18px 26px; border-radius:999px;\n    border:1.5px solid color-mix(in srgb, var(--paper) 25%, transparent);\n    font-family:var(--display); font-weight:700;\n    font-size:clamp(20px, 2vw, 28px);\n    letter-spacing:-0.02em;\n    cursor:pointer;\n    transition:background .15s ease, color .15s ease, transform .15s ease;\n  }\n  .subj:hover{ background:var(--accent); border-color:var(--accent); color:var(--paper); transform:translateY(-3px) }\n  .subj.active{ background:var(--accent); border-color:var(--accent); color:var(--paper) }\n  .subj .em{\n    font-family:var(--mono); font-size:13px; font-weight:600;\n    background:color-mix(in srgb, var(--paper) 18%, transparent);\n    padding:4px 10px; border-radius:999px;\n    letter-spacing:0.04em;\n    display:none;\n  }\n  .subj:hover .em, .subj.active .em{ display:inline-flex }\n  .subj.active .em{ background:rgba(0,0,0,0.2); color:var(--paper) }\n\n  /* ============ FAQ ============ */\n  .faq{\n    padding:100px 32px 80px;\n    position:relative;\n    overflow:hidden;\n  }\n  .faq-list{\n    margin-top:40px;\n    border-top:1.5px solid var(--ink);\n  }\n  .faq-item{\n    border-bottom:1.5px solid var(--ink);\n    padding:0;\n    transition:background .2s ease;\n  }\n  .faq-item:hover{ background:color-mix(in srgb, var(--ink) 4%, transparent) }\n  .faq-item .q{\n    display:flex; align-items:center; justify-content:space-between;\n :var(--accent); color:var(--paper) }\n\n  /* ============ FOOTER ============ */\n  .footer{\n    padding:60px 32px 40px;\n    border-top:1.5px solid var(--ink);\n    background:var(--paper);\n  }\n  .footer-grid{\n    display:grid; grid-template-columns: 2fr 1fr 1fr 1fr;\n    gap:36px;\n    margin-bottom:48px;\n  }\n  .footer-grid.two-col{\n    grid-template-columns: 2fr 1fr;\n    max-width:780px;\n  }\n  .footer h4{\n    font-family:var(--mono); font-size:12px;\n    text-transform:uppercase; letter-spacing:0.08em;\n    margin:0 0 16px 0;\n    opacity:.5; font-weight:700;\n  }\n  .footer ul{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:10px }\n  .footer li{ font-weight:600; font-size:15px }\n  .footer .brand{\n    margin:0 0 32px 0;\n    line-height:0;\n  }\n  .footer .brand-quote{\n    margin:0 0 48px;\n    max-width:880px;\n  }\n  .footer .brand-quote .bq-big{\n    display:block;\n    font-family:var(--display); font-weight:900;\n    font-size:clamp(56px, 9vw, 140px);\n    line-height:.9; letter-spacing:-0.04em;\n    color:var(--ink);\n    margin-bottom:18px;\n  }\n  .footer .brand-quote .bq-small{\n    display:block;\n    font-family:var(--display); font-weight:600;\n    font-size:clamp(20px, 2.4vw, 32px);\n    line-height:1.3; letter-spacing:-0.015em;\n    color:color-mix(in srgb, var(--ink) 75%, transparent);\n    max-width:46ch;\n    text-wrap:balance;\n  }\n  .footer .brand-quote .bq-small::before{\n    content:\"\";\n    display:inline-block;\n    width:36px; height:4px;\n    background:var(--accent);\n    border-radius:3px;\n    margin:0 12px 6px 0;\n    vertical-align:middle;\n  }\n  @media (max-width: 880px){\n    .footer .brand-quote{ margin-bottom:32px }\n    .footer .brand-quote .bq-big{ font-size:48px; margin-bottom:14px }\n    .footer .brand-quote .bq-small{ font-size:18px }\n    .footer .brand-quote .bq-small::before{ width:28px; height:3px; margin-right:10px }\n  }\n  body[data-palette=\"midnight\"] .footer .brand
